name: Mistral PR Reviewer
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Mistral Review Script
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A custom Python or Node.js script that fetches the PR diff 
          # via the GitHub API and sends it to the Mistral API for feedback.
          python scripts/mistral_review.py
